name: OnePlus_Pad2_Pro_C15
on:
  workflow_dispatch:
    inputs:
      enable_kpm:
        description: "启用 KPM (SukiSU Ultra)"
        required: false
        default: true
        type: boolean
      skip_version_check:
        description: "跳过版本比较强制编译"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 22 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /home/runner/.ccache
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y python3 git curl ccache zip libelf-dev bc flex bison libssl-dev

      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Version check
        id: check
        if: ${{ !inputs.skip_version_check }}
        run: |
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git SUKI --depth=1
          cd SUKI
          KSUVER=$((37185 + $(git rev-list --count HEAD)))
          LATEST_TAG=$(git ls-remote --tags https://github.com/44C38B8/oneplus13_a5p_sukisu.git | grep -oE '[0-9]+$' | tail -n1)
          if [ "$KSUVER" -eq "$LATEST_TAG" ]; then
            echo "should_cancel=yes" >> $GITHUB_OUTPUT
          else
            echo "should_cancel=no" >> $GITHUB_OUTPUT
            echo "KSUVER=$KSUVER" >> $GITHUB_ENV
          fi

      - name: Install repo
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod +x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Sync kernel source
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8750 -m oneplus_pad_2_pro.xml --depth=1
          repo sync -c -j$(nproc) --no-tags
          rm -f kernel_platform/common/android/abi_gki_protected_exports_*

      - name: Setup SukiSU Ultra (修复版本冲突)
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          echo "DATE=$(date +%F)" >> $GITHUB_ENV
          cd kernel_workspace/kernel_platform
          # 先删掉自带的旧 kernelsu 驱动，避免版本冲突
          rm -rf ./common/drivers/kernelsu
          # 再安装 SukiSU Ultra
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          # 版本号
          if [ -z "$KSUVER" ]; then
            cd KernelSU
            echo "KSUVER=$((37185 + $(git rev-list --count main)))" >> $GITHUB_ENV
          fi

      - name: Apply SUSFS & LZ4K
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 --depth=1
          git clone https://github.com/SukiSU-Ultra/SukiSU_patch.git --depth=1
          cd kernel_platform/common
          cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./
          patch -p1 -F 3 < 50_add_susfs_in_gki-android15-6.6.patch || true
          cp -rf ../../susfs4ksu/kernel_patches/fs ../../susfs4ksu/kernel_patches/include ./
          cp -rf ../../SukiSU_patch/other/zram/lz4k/{include,lib,crypto} ./
          cp -rf ../../SukiSU_patch/other/zram/lz4k_oplus ./lib/

      - name: HMBird patch (C15必须)
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          curl -L https://gist.githubusercontent.com/leeli0216/raw/6e8d4b8a6f8e7d9a8b3c4f5a7d6e5f4a3b2c1d4e/hmbird_patch.c -o kernel_workspace/kernel_platform/common/drivers/hmbird_patch.c
          echo 'obj-y += hmbird_patch.o' >> kernel_workspace/kernel_platform/common/drivers/Makefile

      - name: Apply LZ4KD
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          cd kernel_workspace/kernel_platform/common
          cp ../../SukiSU_patch/other/zram/zram_patch/6.6/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true

      - name: Configure defconfig
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          cd kernel_workspace/kernel_platform
          DEFCONFIG=./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_LZ4K=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_LZ4KD=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> $DEFCONFIG
          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: Enable KPM
        if: ${{ inputs.enable_kpm && steps.check.outputs.should_cancel != 'yes' }}
        run: |
          echo "CONFIG_KPM=y" >> kernel_workspace/kernel_platform/common/arch/arm64/configs/gki_defconfig

      - name: Build kernel
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          cd kernel_workspace/kernel_platform/common
          export PATH="$PWD/../prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld O=out gki_defconfig all

      - name: Patch kernel image
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          cd kernel_workspace/kernel_platform/common/out/arch/arm64/boot
          curl -L https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux -o patch_linux
          chmod +x patch_linux && ./patch_linux
          mv oImage Image

      - name: Package AnyKernel3
        if: steps.check.outputs.should_cancel != 'yes'
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3.git --depth=1
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -9 -r SukiSU_${{ env.KSUVER }}_OPPad2Pro_C15.zip *

      - name: Upload & Release
        if: steps.check.outputs.should_cancel != 'yes'
        uses: softprops/action-gh-release@v2
        with:
          name: SukiSU ${{ env.KSUVER }} OnePlus Pad2 Pro C15
          tag_name: ${{ env.KSUVER }}
          files: AnyKernel3/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
